<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Flappy Remix</title>
  <style>
    :root {
      --sky-top: #7fd7ff;
      --sky-bottom: #fff7b2;
      --pipe: #4caf50;
      --pipe-dark: #2e7d32;
      --portal: #8b5cf6;
      --portal-alt: #f97316;
      --ground: #76c95f;
      --ground-dark: #5da84a;
      --bird: #ffca28;
      --ink: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ecf9ff 0%, #e0f7ff 60%, #f8ffd8 100%);
      color: var(--ink);
    }

    .shell {
      width: min(95vw, 560px);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.93);
      border: 2px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.94rem;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      cursor: pointer;
      touch-action: manipulation;
    }

    .hint {
      padding: 10px 14px 14px;
      font-size: 0.9rem;
      color: #4b5563;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Best: <span id="best">0</span></div>
      <div>Mode: <span id="mode">Portal Flappy</span></div>
      <div>Coins: <span id="coins">0</span></div>
    </div>
    <canvas id="game" width="560" height="700"></canvas>
    <div class="hint">Tap/click or press Space. Go through giant middle portals. Hidden coins are small and tricky to reach.</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const modeEl = document.getElementById('mode');
    const coinsEl = document.getElementById('coins');

    const W = canvas.width;
    const H = canvas.height;

    const GROUND_H = 92;
    const PIPE_W = 78;
    const PIPE_GAP = 184;
    const PIPE_SPEED = 2.6;
    const BIG_PORTAL_R = 62;

    const FLAP_G = 0.4;
    const FLAP_V = -7.2;

    let state = 'ready';
    let score = 0;
    let best = Number(localStorage.getItem('portal-remix-best') || 0);
    let coinCount = 0;
    let deathCount = Number(localStorage.getItem('portal-remix-deaths') || 0);
    let adRequired = false;
    let adVisible = false;
    let adTimer = 0;
    let adCooldown = 0;
    let activeEffect = 'None';
    let effectFrames = 0;
    let gravityMul = 1;
    let flapMul = 1;
    let pipeMul = 1;
    let magnetFrames = 0;
    let failReason = 'Avoid obstacles.';

    let pipeTimer = 0;
    let portalCooldown = 0;
    let pipes = [];
    let portals = [];
    let hiddenCoins = [];

    const portalKinds = ['lowGravity', 'highGravity', 'boostFlap', 'slowPipes', 'magnet', 'coinRain'];

    const player = {
      x: 140,
      y: H * 0.42,
      vy: 0,
      r: 18,
      rotation: 0
    };

    function resetRun() {
      if (adVisible) return;
      state = 'ready';
      score = 0;
      coinCount = 0;
      failReason = 'Avoid obstacles.';
      activeEffect = 'None';
      effectFrames = 0;
      gravityMul = 1;
      flapMul = 1;
      pipeMul = 1;
      magnetFrames = 0;
      pipeTimer = 0;
      portalCooldown = 0;
      pipes = [];
      portals = [];
      hiddenCoins = [];
      player.y = H * 0.42;
      player.vy = 0;
      player.rotation = 0;
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      coinsEl.textContent = coinCount;
      modeEl.textContent = activeEffect === 'None' ? 'Portal Flappy' : `Portal Flappy • ${activeEffect}`;
    }

    function resetEffects() {
      activeEffect = 'None';
      effectFrames = 0;
      gravityMul = 1;
      flapMul = 1;
      pipeMul = 1;
      magnetFrames = 0;
    }

    function setEffect(name, frames, config) {
      activeEffect = name;
      effectFrames = frames;
      gravityMul = config.gravityMul ?? 1;
      flapMul = config.flapMul ?? 1;
      pipeMul = config.pipeMul ?? 1;
      magnetFrames = config.magnetFrames ?? 0;
    }

    function applyPortalKind(kind) {
      score += 10;
      if (kind === 'lowGravity') {
        setEffect('Low Gravity', 300, { gravityMul: 0.55, flapMul: 1.05 });
      } else if (kind === 'highGravity') {
        setEffect('Heavy Gravity', 300, { gravityMul: 1.55, flapMul: 0.9 });
      } else if (kind === 'boostFlap') {
        setEffect('Boost Flap', 300, { gravityMul: 1, flapMul: 1.45 });
      } else if (kind === 'slowPipes') {
        setEffect('Slow Pipes', 300, { gravityMul: 1, flapMul: 1, pipeMul: 0.72 });
      } else if (kind === 'magnet') {
        setEffect('Coin Magnet', 360, { gravityMul: 1, flapMul: 1, pipeMul: 1, magnetFrames: 360 });
      } else if (kind === 'coinRain') {
        activeEffect = 'Coin Rain';
        effectFrames = 180;
        coinCount += 12;
        score += 12;
      }
      best = Math.max(best, score);
      localStorage.setItem('portal-remix-best', String(best));
      updateHud();
    }

    function startGame() {
      if (adVisible) return;
      if (state === 'over') {
        resetRun();
      }
      state = 'playing';
    }

    function startAdBreak() {
      adRequired = false;
      adVisible = true;
      adTimer = 8;
      adCooldown = 0;
      state = 'over';
      failReason = 'Ad break';
      updateHud();
    }

    function finishAdBreak() {
      adVisible = false;
      adTimer = 0;
      resetRun();
    }

    function endGame(reason) {
      if (adVisible) return;
      state = 'over';
      failReason = reason;
      deathCount += 1;
      localStorage.setItem('portal-remix-deaths', String(deathCount));
      best = Math.max(best, score);
      localStorage.setItem('portal-remix-best', String(best));
      updateHud();
      if (deathCount >= 6) {
        deathCount = 0;
        localStorage.setItem('portal-remix-deaths', '0');
        adRequired = true;
        startAdBreak();
        return;
      }
    }

    function tapAction() {
      if (adVisible) {
        if (adTimer <= 0) {
          finishAdBreak();
        }
        return;
      }
      if (state === 'ready') {
        startGame();
      }
      if (state !== 'playing') return;

      player.vy = FLAP_V;
    }

    function spawnPipe() {
      const minTop = 70;
      const maxTop = H - GROUND_H - PIPE_GAP - 70;
      const topH = minTop + Math.random() * (maxTop - minTop);
      const fakeTop = Math.random() < 0.5;
      const fakeSpot = fakeTop
        ? {
            x: W + 20 + (PIPE_W - 48) / 2,
            y: 34 + Math.random() * Math.max(20, topH - 88),
            w: 48,
            h: 56
          }
        : {
            x: W + 20 + (PIPE_W - 48) / 2,
            y: topH + PIPE_GAP + 16 + Math.random() * Math.max(18, H - GROUND_H - (topH + PIPE_GAP) - 88),
            w: 48,
            h: 56
          };

      const newPipe = {
        x: W + 20,
        topH,
        bottomY: topH + PIPE_GAP,
        passed: false,
        fakeSpot,
        fakeCoin: {
          x: fakeSpot.x + fakeSpot.w / 2,
          y: fakeSpot.y + fakeSpot.h / 2,
          r: 12,
          value: 12,
          collected: false,
          life: 520
        }
      };
      const prev = pipes[pipes.length - 1];
      pipes.push(newPipe);

      if (prev) {
        spawnBigPortalBetween(prev, newPipe);
        spawnHiddenCoinsBetween(prev, newPipe);
      }
    }

    function spawnHiddenCoinsBetween(leftPipe, rightPipe) {
      if (!leftPipe || !rightPipe) return;
      const laneStart = leftPipe.x + PIPE_W;
      const laneEnd = rightPipe.x;
      const centerX = (laneStart + laneEnd) / 2;
      const gapCenter = leftPipe.topH + PIPE_GAP / 2;

      const roll = Math.random();
      if (roll < 0.55) {
        const topSide = Math.random() < 0.5;
        const offsetY = topSide ? -PIPE_GAP * (0.38 + Math.random() * 0.08) : PIPE_GAP * (0.34 + Math.random() * 0.08);
        hiddenCoins.push({
          x: centerX + (Math.random() * 24 - 12),
          y: gapCenter + offsetY,
          r: 7,
          value: 5,
          collected: false,
          alpha: 0.55,
          life: 520
        });
      }

      if (roll > 0.78) {
        hiddenCoins.push({
          x: centerX + (Math.random() * 28 - 14),
          y: leftPipe.topH + 24 + Math.random() * 18,
          r: 10,
          value: 8,
          collected: false,
          alpha: 0.42,
          life: 520
        });
      }
    }

    function spawnBigPortalBetween(leftPipe, rightPipe) {
      const laneStart = leftPipe.x + PIPE_W;
      const laneEnd = rightPipe.x;
      if (laneEnd - laneStart < BIG_PORTAL_R * 1.1) return;

      const leftCenterY = leftPipe.topH + PIPE_GAP / 2;
      const rightCenterY = rightPipe.topH + PIPE_GAP / 2;
      const kind = portalKinds[(Math.random() * portalKinds.length) | 0];

      portals.push({
        x: (laneStart + laneEnd) / 2,
        y: (leftCenterY + rightCenterY) / 2,
        r: BIG_PORTAL_R,
        kind,
        triggered: false,
        required: true,
        life: 520
      });
    }

    function circleRectHit(cx, cy, cr, rx, ry, rw, rh) {
      const nx = Math.max(rx, Math.min(cx, rx + rw));
      const ny = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nx;
      const dy = cy - ny;
      return dx * dx + dy * dy < cr * cr;
    }

    function circleHitsCircle(ax, ay, ar, bx, by, br) {
      const dx = ax - bx;
      const dy = ay - by;
      return dx * dx + dy * dy < (ar + br) * (ar + br);
    }

    function rectContainsCircle(cx, cy, cr, rx, ry, rw, rh) {
      return cx - cr < rx && cx + cr > rx + rw && cy - cr < ry && cy + cr > ry + rh;
    }

    function updatePortalFlappy() {
      if (effectFrames > 0) {
        effectFrames -= 1;
        if (effectFrames <= 0) {
          resetEffects();
        }
      }

      if (magnetFrames > 0) {
        magnetFrames -= 1;
      }

      pipeTimer += 1;
      if (pipeTimer >= 95) {
        spawnPipe();
        pipeTimer = 0;
      }

      player.vy += FLAP_G * gravityMul;
      player.y += player.vy;
      player.rotation = Math.max(-0.9, Math.min(1.1, player.vy / (11 * flapMul)));

      pipes.forEach((p) => { p.x -= PIPE_SPEED * pipeMul; });
      portals.forEach((p) => {
        p.x -= PIPE_SPEED * pipeMul;
        p.life -= 1;
      });

      for (let i = pipes.length - 1; i >= 0; i -= 1) {
        const p = pipes[i];
        const fakeSpot = p.fakeSpot;
        const inFakeSpot = fakeSpot && circleHitsCircle(player.x, player.y, player.r, fakeSpot.x + fakeSpot.w / 2, fakeSpot.y + fakeSpot.h / 2, Math.max(fakeSpot.w, fakeSpot.h) / 2 - 4);
        const topHit = !inFakeSpot && circleRectHit(player.x, player.y, player.r, p.x, 0, PIPE_W, p.topH);
        const bottomHit = !inFakeSpot && circleRectHit(player.x, player.y, player.r, p.x, p.bottomY, PIPE_W, H - GROUND_H - p.bottomY);
        if (topHit || bottomHit) {
          endGame('Hit a pipe.');
          return;
        }

        if (!p.passed && p.x + PIPE_W < player.x) {
          p.passed = true;
          score += 1;
          updateHud();
        }

        if (p.x + PIPE_W < -30) pipes.splice(i, 1);
      }

      for (let i = portals.length - 1; i >= 0; i -= 1) {
        const p = portals[i];
        const dx = player.x - p.x;
        const dy = player.y - p.y;
        const touching = dx * dx + dy * dy < (player.r + p.r) * (player.r + p.r);

        if (touching && !p.triggered && portalCooldown <= 0) {
          p.triggered = true;
          portalCooldown = 45;
          applyPortalKind(p.kind);
          updateHud();
          return;
        }

        const missedRequired = p.required && !p.triggered && p.x + p.r < player.x;
        if (missedRequired) {
          endGame('You must go through the giant portal.');
          return;
        }
      }

      portals = portals.filter((p) => p.x + p.r > -40 && p.life > 0);
      hiddenCoins.forEach((c) => {
        c.x -= PIPE_SPEED * pipeMul;
        c.life -= 1;
        if (magnetFrames > 0) {
          c.x += (player.x - c.x) * 0.04;
          c.y += (player.y - c.y) * 0.04;
        }
      });
      hiddenCoins = hiddenCoins.filter((c) => c.life > 0 && c.x + c.r > -20);

      for (let i = hiddenCoins.length - 1; i >= 0; i -= 1) {
        const c = hiddenCoins[i];
        if (circleHitsCircle(player.x, player.y, player.r, c.x, c.y, c.r)) {
          hiddenCoins.splice(i, 1);
          coinCount += c.value;
          score += c.value;
          best = Math.max(best, score);
          localStorage.setItem('portal-remix-best', String(best));
          updateHud();
        }
      }

      for (let i = pipes.length - 1; i >= 0; i -= 1) {
        const p = pipes[i];
        if (p.fakeCoin && !p.fakeCoin.collected) {
          p.fakeCoin.x -= PIPE_SPEED * pipeMul;
          p.fakeCoin.life -= 1;
          if (magnetFrames > 0) {
            p.fakeCoin.x += (player.x - p.fakeCoin.x) * 0.05;
            p.fakeCoin.y += (player.y - p.fakeCoin.y) * 0.05;
          }
          if (circleHitsCircle(player.x, player.y, player.r, p.fakeCoin.x, p.fakeCoin.y, p.fakeCoin.r)) {
            p.fakeCoin.collected = true;
            coinCount += p.fakeCoin.value;
            score += p.fakeCoin.value;
            best = Math.max(best, score);
            localStorage.setItem('portal-remix-best', String(best));
            updateHud();
          }
          if (p.fakeCoin.life <= 0) {
            p.fakeCoin.collected = true;
          }
        }
      }

      if (player.y - player.r <= 0 || player.y + player.r >= H - GROUND_H) {
        endGame('Crashed into ceiling or ground.');
      }
    }

    function update() {
      if (adVisible) {
        if (adTimer > 0) {
          adTimer -= 1 / 60;
        }
        return;
      }

      if (state !== 'playing') return;

      if (portalCooldown > 0) portalCooldown -= 1;

      updatePortalFlappy();
    }

    function drawSky() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#82e4ff');
      grad.addColorStop(0.6, '#d4f8ff');
      grad.addColorStop(1, '#fff6be');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.arc(W - 95, 95, 42, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      for (let i = 0; i < 6; i += 1) {
        const x = 55 + i * 88;
        const y = 78 + (i % 2) * 26;
        ctx.beginPath();
        ctx.arc(x, y, 13, 0, Math.PI * 2);
        ctx.arc(x + 14, y - 4, 16, 0, Math.PI * 2);
        ctx.arc(x + 32, y, 11, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = getCss('--ground');
      ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
      ctx.fillStyle = getCss('--ground-dark');
      for (let i = 0; i < 15; i += 1) {
        ctx.fillRect(i * 40 - 16, H - GROUND_H + 14, 24, 10);
      }
    }

    function drawPipes() {
      pipes.forEach((p) => {
        ctx.fillStyle = getCss('--pipe');
        ctx.fillRect(p.x, 0, PIPE_W, p.topH);
        ctx.fillStyle = getCss('--pipe-dark');
        ctx.fillRect(p.x, p.topH - 13, PIPE_W, 13);

        ctx.fillStyle = getCss('--pipe');
        ctx.fillRect(p.x, p.bottomY, PIPE_W, H - GROUND_H - p.bottomY);
        ctx.fillStyle = getCss('--pipe-dark');
        ctx.fillRect(p.x, p.bottomY, PIPE_W, 13);

        if (p.fakeSpot) {
          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = '#050505';
          ctx.fillRect(p.fakeSpot.x, p.fakeSpot.y, p.fakeSpot.w, p.fakeSpot.h);
          ctx.fillStyle = 'rgba(80,80,80,0.7)';
          ctx.fillRect(p.fakeSpot.x + 4, p.fakeSpot.y + 4, p.fakeSpot.w - 8, p.fakeSpot.h - 8);
          ctx.strokeStyle = '#111';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.fakeSpot.x + 1, p.fakeSpot.y + 1, p.fakeSpot.w - 2, p.fakeSpot.h - 2);
          ctx.restore();
        }
      });
    }

    function drawPortals() {
      portals.forEach((p) => {
        const portalColors = {
          lowGravity: '#8b5cf6',
          highGravity: '#ef4444',
          boostFlap: '#22c55e',
          slowPipes: '#f97316',
          magnet: '#06b6d4',
          coinRain: '#eab308'
        };
        const ring = portalColors[p.kind] || getCss('--portal');
        const pulse = 0.86 + Math.sin((Date.now() / 140) + p.y * 0.02) * 0.16;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.strokeStyle = ring;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(0, 0, p.r * pulse, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, p.r * 0.58, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = ring;
        if (p.kind === 'lowGravity') {
          ctx.fillRect(-10, -4, 20, 8);
        } else if (p.kind === 'highGravity') {
          ctx.beginPath();
          ctx.arc(0, 0, 8, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.kind === 'boostFlap') {
          ctx.fillRect(-4, -10, 8, 20);
        } else if (p.kind === 'slowPipes') {
          ctx.fillRect(-10, -10, 20, 20);
        } else if (p.kind === 'magnet') {
          ctx.beginPath();
          ctx.arc(0, 0, 8, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-8, -8, 16, 16);
        }
        ctx.restore();
      });
    }

    function drawHiddenCoins() {
      hiddenCoins.forEach((c) => {
        ctx.save();
        ctx.globalAlpha = c.alpha;
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff7cc';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      });

      pipes.forEach((p) => {
        if (p.fakeCoin && !p.fakeCoin.collected) {
          ctx.save();
          ctx.fillStyle = '#ffd54f';
          ctx.beginPath();
          ctx.arc(p.fakeCoin.x, p.fakeCoin.y, p.fakeCoin.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#fff9cc';
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.restore();
        }
      });
    }

    function drawBirdOrSquare() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.rotation * 0.65);
      ctx.fillStyle = getCss('--bird');
      ctx.beginPath();
      ctx.arc(0, 0, player.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fb923c';
      ctx.beginPath();
      ctx.arc(8, -4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(5, -6, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawOverlays() {
      if (adVisible) {
        ctx.fillStyle = 'rgba(0,0,0,0.78)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 34px Arial';
        ctx.fillText('Ad Break', W / 2, H / 2 - 46);
        ctx.font = '18px Arial';
        ctx.fillText('Watch this short ad to continue', W / 2, H / 2 - 12);
        ctx.fillText(`Continue in ${Math.max(0, Math.ceil(adTimer))}s`, W / 2, H / 2 + 18);
        ctx.fillText(adTimer <= 0 ? 'Tap to close ad' : 'Please wait', W / 2, H / 2 + 48);
        ctx.textAlign = 'left';
        return;
      }

      if (state === 'ready') {
        ctx.fillStyle = 'rgba(255,255,255,0.56)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#1f2937';
        ctx.font = 'bold 30px Arial';
        ctx.fillText('Portal Flappy Remix', W / 2, H / 2 - 40);
        ctx.font = '16px Arial';
        ctx.fillText('Go through giant portals centered between pipes', W / 2, H / 2 - 6);
        ctx.fillText('Hidden coins are tiny, rare, and off the main path', W / 2, H / 2 + 22);
        ctx.fillText('Portals can change gravity, flap power, pipe speed, or coins', W / 2, H / 2 + 50);
        ctx.fillText('Tap / Space to start', W / 2, H / 2 + 80);
        ctx.textAlign = 'left';
      }

      if (state === 'over') {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 34px Arial';
        ctx.fillText('Game Over', W / 2, H / 2 - 20);
        ctx.font = '18px Arial';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);
        ctx.fillText(`Deaths: ${deathCount}/6`, W / 2, H / 2 + 28);
        ctx.fillText(failReason, W / 2, H / 2 + 40);
        ctx.fillText('Tap / Space to restart', W / 2, H / 2 + 70);
        ctx.textAlign = 'left';
      }
    }

    function getCss(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function draw() {
      drawSky();
      drawPipes();
      drawPortals();
      drawHiddenCoins();
      drawBirdOrSquare();
      drawGround();
      drawOverlays();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (adVisible) {
          if (adTimer <= 0) finishAdBreak();
          return;
        }
        if (state === 'over') {
          if (adRequired) {
            startAdBreak();
            return;
          }
          resetRun();
          startGame();
        } else {
          tapAction();
        }
      }
    });

    canvas.addEventListener('pointerdown', () => {
      if (adVisible) {
        if (adTimer <= 0) finishAdBreak();
        return;
      }
      if (state === 'over') {
        if (adRequired) {
          startAdBreak();
          return;
        }
        resetRun();
        startGame();
      } else {
        tapAction();
      }
    });

    resetRun();
    loop();
  </script>
</body>
</html>
