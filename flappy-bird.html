<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Flappy Bird</title>
  <style>
    :root {
      --sky-top: #76d8ff;
      --sky-bottom: #fff4ab;
      --ground: #73c96a;
      --pipe: #4caf50;
      --pipe-dark: #2e7d32;
      --flip-portal: #8b5cf6;
      --clone-portal: #f97316;
      --bird-main: #ffca28;
      --bird-clone: #22d3ee;
      --ink: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ebf9ff 0%, #d3f2ff 55%, #f9ffe0 100%);
      color: var(--ink);
    }

    .shell {
      width: min(94vw, 520px);
      border-radius: 22px;
      overflow: hidden;
      border: 2px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      font-weight: 700;
      background: rgba(255,255,255,0.68);
      font-size: 0.95rem;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      cursor: pointer;
      touch-action: manipulation;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 14px 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff9800, #ff6d00);
      box-shadow: 0 7px 16px rgba(255, 109, 0, 0.28);
    }

    button.secondary {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      box-shadow: 0 7px 16px rgba(46, 125, 50, 0.25);
    }

    .hint {
      text-align: center;
      font-size: 0.92rem;
      color: #4b5563;
      padding: 0 14px 14px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.84rem;
      color: #334155;
      padding: 0 14px 12px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Best: <span id="best">0</span></div>
      <div>Birds: <span id="birds">1</span></div>
    </div>
    <canvas id="game" width="520" height="680"></canvas>
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="restartBtn" class="secondary">Restart</button>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#8b5cf6"></span>Flip portal (reverse gravity)</span>
      <span><span class="dot" style="background:#f97316"></span>Clone portal (adds a second bird)</span>
    </div>
    <div class="hint">Click/tap or press Space to flap all birds. Go through every portal, and avoid pipes plus floor/ceiling.</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const birdsEl = document.getElementById('birds');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_H = 88;
    const PIPE_W = 74;
    const PIPE_GAP = 178;
    const PIPE_SPEED = 2.65;
    const PORTAL_RADIUS = 56;

    const FLAP_V = 6.9;
    const BASE_G = 0.39;

    let birds = [];
    let pipes = [];
    let portals = [];
    let score = 0;
    let best = Number(localStorage.getItem('portal-flappy-best') || 0);
    let spawnPipeTimer = 0;
    let state = 'ready';
    let failReason = 'Avoid pipes and floor/ceiling.';

    function updateHud() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      birdsEl.textContent = birds.length;
    }

    function makeBird(opts = {}) {
      return {
        x: opts.x ?? 130,
        y: opts.y ?? H * 0.45,
        vy: 0,
        r: 18,
        gravity: opts.gravity ?? BASE_G,
        flapDir: opts.flapDir ?? -1,
        color: opts.color ?? 'main',
        tilt: 0,
        alive: true,
        touchedFlipPortalId: null,
        touchedClonePortalId: null
      };
    }

    function resetGame() {
      birds = [makeBird({ color: 'main' })];
      pipes = [];
      portals = [];
      score = 0;
      spawnPipeTimer = 0;
      state = 'ready';
      failReason = 'Avoid pipes and floor/ceiling.';
      startBtn.disabled = false;
      startBtn.textContent = 'Start';
      updateHud();
    }

    function endGame(reason) {
      state = 'over';
      failReason = reason;
      startBtn.disabled = false;
      startBtn.textContent = 'Start';
    }

    function startGame() {
      if (state === 'over') {
        resetGame();
      }
      state = 'playing';
      startBtn.textContent = 'Playing';
      startBtn.disabled = true;
    }

    function flap() {
      if (state === 'ready') {
        startGame();
      }
      if (state !== 'playing') return;

      birds.forEach((b) => {
        b.vy = FLAP_V * b.flapDir;
      });
    }

    function spawnPipe() {
      const minTop = 70;
      const maxTop = H - GROUND_H - PIPE_GAP - 70;
      const topH = minTop + Math.random() * (maxTop - minTop);
      const pipe = {
        x: W + 20,
        topH,
        bottomY: topH + PIPE_GAP,
        passed: false
      };
      pipes.push(pipe);
      return pipe;
    }

    function spawnPortalBetweenPipes(leftPipe, rightPipe) {
      if (!leftPipe || !rightPipe) return;
      const type = Math.random() < 0.5 ? 'flip' : 'clone';
      const leftCenterY = leftPipe.topH + PIPE_GAP / 2;
      const rightCenterY = rightPipe.topH + PIPE_GAP / 2;
      const y = (leftCenterY + rightCenterY) / 2;

      const laneStart = leftPipe.x + PIPE_W;
      const laneEnd = rightPipe.x;
      if (laneEnd - laneStart < PORTAL_RADIUS * 1.2) return;

      portals.push({
        x: (laneStart + laneEnd) / 2,
        y,
        r: PORTAL_RADIUS,
        type,
        id: `${type}-${Math.random().toString(36).slice(2, 9)}`,
        life: 520,
        triggered: false,
        required: true
      });
    }

    function cloneBirdFrom(source) {
      if (birds.length >= 4) return;
      const gravityScale = 0.65 + Math.random() * 1.1;
      const clone = makeBird({
        x: source.x + 8,
        y: source.y + (Math.random() * 22 - 11),
        gravity: BASE_G * gravityScale,
        flapDir: source.flapDir,
        color: 'clone'
      });
      clone.vy = source.vy * 0.6;
      birds.push(clone);
      updateHud();
    }

    function collideCircleRect(cx, cy, cr, rx, ry, rw, rh) {
      const nearX = Math.max(rx, Math.min(cx, rx + rw));
      const nearY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nearX;
      const dy = cy - nearY;
      return dx * dx + dy * dy < cr * cr;
    }

    function collideBirdPipe(bird, pipe) {
      const hitTop = collideCircleRect(bird.x, bird.y, bird.r, pipe.x, 0, PIPE_W, pipe.topH);
      const hitBottom = collideCircleRect(
        bird.x,
        bird.y,
        bird.r,
        pipe.x,
        pipe.bottomY,
        PIPE_W,
        H - GROUND_H - pipe.bottomY
      );
      return hitTop || hitBottom;
    }

    function updateBirds() {
      for (let i = birds.length - 1; i >= 0; i -= 1) {
        const b = birds[i];

        b.vy += b.gravity;
        b.y += b.vy;
        b.tilt = Math.max(-1.2, Math.min(1.2, b.vy / 10));

        for (let j = 0; j < pipes.length; j += 1) {
          if (collideBirdPipe(b, pipes[j])) {
            b.alive = false;
            break;
          }
        }

        if (b.y + b.r >= H - GROUND_H || b.y - b.r <= 0) {
          b.alive = false;
        }

        if (b.alive) {
          for (let k = portals.length - 1; k >= 0; k -= 1) {
            const p = portals[k];
            const dx = b.x - p.x;
            const dy = b.y - p.y;
            const touching = dx * dx + dy * dy < (b.r + p.r) * (b.r + p.r);

            if (p.type === 'flip') {
              if (touching && b.touchedFlipPortalId !== p.id) {
                b.flapDir *= -1;
                b.gravity *= -1;
                b.vy *= 0.55;
                b.touchedFlipPortalId = p.id;
                p.triggered = true;
              }
              if (!touching && b.touchedFlipPortalId === p.id) {
                b.touchedFlipPortalId = null;
              }
            } else {
              if (touching && b.touchedClonePortalId !== p.id) {
                cloneBirdFrom(b);
                b.touchedClonePortalId = p.id;
                p.triggered = true;
              }
              if (!touching && b.touchedClonePortalId === p.id) {
                b.touchedClonePortalId = null;
              }
            }
          }
        }

        if (!b.alive) {
          birds.splice(i, 1);
        }
      }

      if (birds.length === 0) {
        endGame('All birds were lost.');
      }

      updateHud();
    }

    function update() {
      if (state !== 'playing') return;

      spawnPipeTimer += 1;

      if (spawnPipeTimer >= 95) {
        const previousPipe = pipes[pipes.length - 1];
        const newPipe = spawnPipe();
        if (previousPipe) {
          spawnPortalBetweenPipes(previousPipe, newPipe);
        }
        spawnPipeTimer = 0;
      }

      pipes.forEach((p) => {
        p.x -= PIPE_SPEED;
      });

      for (let i = pipes.length - 1; i >= 0; i -= 1) {
        const p = pipes[i];
        if (!p.passed && p.x + PIPE_W < birds[0]?.x) {
          p.passed = true;
          score += 1;
          best = Math.max(best, score);
          localStorage.setItem('portal-flappy-best', String(best));
          updateHud();
        }
        if (p.x + PIPE_W < -30) {
          pipes.splice(i, 1);
        }
      }

      portals.forEach((p) => {
        p.x -= PIPE_SPEED;
        p.life -= 1;
      });

      for (let i = portals.length - 1; i >= 0; i -= 1) {
        const p = portals[i];
        const missedRequiredPortal = p.required && !p.triggered && p.x + p.r < (birds[0]?.x ?? 130);
        if (missedRequiredPortal) {
          endGame('You must pass through every portal.');
          return;
        }
      }

      portals = portals.filter((p) => p.x + p.r > -30 && p.life > 0);

      updateBirds();
    }

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#82deff');
      g.addColorStop(0.55, '#d2f6ff');
      g.addColorStop(1, '#fff7bc');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.arc(W - 90, 100, 40, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      for (let i = 0; i < 5; i += 1) {
        const cx = 75 + i * 95;
        const cy = 80 + (i % 2) * 34;
        ctx.beginPath();
        ctx.arc(cx, cy, 14, 0, Math.PI * 2);
        ctx.arc(cx + 16, cy - 4, 16, 0, Math.PI * 2);
        ctx.arc(cx + 34, cy, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = varColor('--ground');
      ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

      ctx.fillStyle = '#5ea94e';
      for (let i = 0; i < 14; i += 1) {
        const x = i * 40 - 18;
        ctx.fillRect(x, H - GROUND_H + 14, 24, 10);
      }
    }

    function drawPipes() {
      pipes.forEach((p) => {
        ctx.fillStyle = varColor('--pipe');
        ctx.fillRect(p.x, 0, PIPE_W, p.topH);
        ctx.fillStyle = varColor('--pipe-dark');
        ctx.fillRect(p.x, p.topH - 13, PIPE_W, 13);

        ctx.fillStyle = varColor('--pipe');
        ctx.fillRect(p.x, p.bottomY, PIPE_W, H - GROUND_H - p.bottomY);
        ctx.fillStyle = varColor('--pipe-dark');
        ctx.fillRect(p.x, p.bottomY, PIPE_W, 13);
      });
    }

    function drawPortals() {
      portals.forEach((p) => {
        const ring = p.type === 'flip' ? varColor('--flip-portal') : varColor('--clone-portal');
        const pulse = 0.8 + Math.sin((Date.now() / 120) + p.y * 0.03) * 0.2;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.strokeStyle = ring;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(0, 0, p.r * pulse, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, p.r * 0.56, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = ring;
        if (p.type === 'flip') {
          ctx.fillRect(-8, -2, 16, 4);
          ctx.fillRect(-2, -10, 4, 20);
        } else {
          ctx.beginPath();
          ctx.arc(-5, 0, 5, 0, Math.PI * 2);
          ctx.arc(5, 0, 5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }

    function drawBird(b) {
      const color = b.color === 'main' ? varColor('--bird-main') : varColor('--bird-clone');
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.tilt * 0.6 + (b.gravity < 0 ? Math.PI : 0));

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fb923c';
      ctx.beginPath();
      ctx.arc(8, -4, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(5, -5, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.font = '11px Arial';
      ctx.fillText(`g:${Math.abs(b.gravity).toFixed(2)}`, b.x - 13, b.y + b.r + 14);
    }

    function drawOverlays() {
      if (state === 'ready') {
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#1f2937';
        ctx.textAlign = 'center';
        ctx.font = 'bold 30px Arial';
        ctx.fillText('Portal Flappy Bird', W / 2, H / 2 - 28);
        ctx.font = '16px Arial';
        ctx.fillText('Purple portal flips gravity (upside-down flight)', W / 2, H / 2 + 4);
        ctx.fillText('Orange portal duplicates bird with unique gravity', W / 2, H / 2 + 30);
        ctx.fillText('Every portal is required: missing one ends the run', W / 2, H / 2 + 56);
        ctx.fillText('Tap / Space to flap', W / 2, H / 2 + 82);
        ctx.textAlign = 'left';
      }

      if (state === 'over') {
        ctx.fillStyle = 'rgba(0,0,0,0.33)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 34px Arial';
        ctx.fillText('Game Over', W / 2, H / 2 - 20);
        ctx.font = '19px Arial';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 12);
        ctx.fillText(`Best: ${best}`, W / 2, H / 2 + 38);
        ctx.font = '15px Arial';
        ctx.fillText(failReason, W / 2, H / 2 + 66);
        ctx.fillText('Press Restart or Space to play again', W / 2, H / 2 + 90);
        ctx.textAlign = 'left';
      }
    }

    function varColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function draw() {
      drawSky();
      drawPipes();
      drawPortals();
      birds.forEach(drawBird);
      drawGround();
      drawOverlays();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('pointerdown', () => {
      if (state === 'over') {
        resetGame();
        startGame();
      } else {
        flap();
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (state === 'over') {
          resetGame();
          startGame();
        } else {
          flap();
        }
      }
    });

    startBtn.addEventListener('click', () => {
      if (state === 'ready' || state === 'over') {
        resetGame();
        startGame();
      }
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      startGame();
    });

    updateHud();
    resetGame();
    loop();
  </script>
</body>
</html>
